<!doctype html>
<html lang="en">

<head>
    <title>Register &mdash; Tutor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="fonts/icomoon/style.css">
    <link rel="stylesheet" href="fonts/brand/style.css">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-datepicker.css">
    <link rel="stylesheet" href="css/jquery.fancybox.min.css">
    <link rel="stylesheet" href="css/owl.carousel.min.css">
    <link rel="stylesheet" href="css/owl.theme.default.min.css">
    <link rel="stylesheet" href="css/aos.css">

    <!-- MAIN CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/jpeg" href="images/favicon.jpg">



    <style>
        .hover-bg-primary-white:hover {
            background: #0779e4 !important;
            color: #fff !important;
        }

        .hover-bg-info-white:hover {
            background: #1da1f2 !important;
            color: #fff !important;
        }

        .hover-bg-danger-white:hover {
            background: #db4437 !important;
            color: #fff !important;
        }

        .rounded-circle {
            width: 45px;
            height: 45px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: .3s all ease;
        }
    </style>

    <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>


    <div class="site-wrap" id="home-section">

        <div class="site-section bg-light min-vh-100 d-flex align-items-center"
            style="background-image: url('https://images.unsplash.com/photo-1524178232363-1fb2b075b655?auto=format&fit=crop&w=1920&q=80'); background-size: cover; background-position: center;">
            <div class="container py-5">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="p-4 bg-white shadow-lg rounded">
                            <div class="text-center mb-4">
                                <div class="site-logo mb-4">
                                    <a href="index.html" class="text-black h2 mb-0"><span
                                            class="icon-book text-primary mr-3"></span><strong>Tutor</strong></a>
                                </div>
                                <h3 class="h4 text-black">Register</h3>
                            </div>
                            <form action="#">
                                <div class="row">
                                    <div class="col-md-6 form-group mb-3">
                                        <label class="text-black" for="fname">First Name</label>
                                        <input type="text" id="fname" class="form-control" placeholder="John">
                                    </div>
                                    <div class="col-md-6 form-group mb-3">
                                        <label class="text-black" for="lname">Last Name</label>
                                        <input type="text" id="lname" class="form-control" placeholder="Doe">
                                    </div>
                                </div>

                                <div class="form-group mb-3">
                                    <label class="text-black" for="email">Email</label>
                                    <input type="email" id="email" class="form-control" placeholder="john@example.com">
                                </div>

                                <div class="form-group mb-3">
                                    <label class="text-black" for="password">Password</label>
                                    <input type="password" id="password" class="form-control" placeholder="********">
                                </div>

                                <div class="form-group mb-3">
                                    <label class="text-black" for="confirm_password">Confirm Password</label>
                                    <input type="password" id="confirm_password" class="form-control"
                                        placeholder="********">
                                </div>

                                <div class="form-group mb-3">
                                    <div class="custom-control custom-checkbox">
                                        <input type="checkbox" class="custom-control-input" id="terms_conditions">
                                        <label class="custom-control-label text-black" for="terms_conditions">I agree to the Terms and Conditions</label>
                                    </div>
                                </div>

                                <div class="form-group mb-3">
                                    <input type="submit" value="Register Now"
                                        class="btn btn-primary btn-block text-white py-3">
                                </div>

                                <div class="text-center">
                                    <p class="mb-0">Already have an account? <a href="login.html"
                                            class="font-weight-bold">Login</a></p>

                                    <div class="mt-4 pt-4 border-top">
                                        <p class="small text-muted mb-3">Or register with</p>
                                        <div class="d-flex justify-content-center">
                                            <a href="#"
                                                class="mx-2 p-3 bg-light rounded-circle text-primary hover-bg-primary-white"><span
                                                    class="icon-facebook"></span></a>
                                            <a href="#"
                                                class="mx-2 p-3 bg-light rounded-circle text-info hover-bg-info-white"><span
                                                    class="icon-twitter"></span></a>
                                            <a href="#"
                                                class="mx-2 p-3 bg-light rounded-circle text-danger hover-bg-danger-white"><span
                                                    class="icon-google-plus"></span></a>
                                        </div>
                                    </div>

                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/owl.carousel.min.js"></script>
    <script src="js/jquery.sticky.js"></script>
    <script src="js/jquery.waypoints.min.js"></script>
    <script src="js/jquery.animateNumber.min.js"></script>
    <script src="js/jquery.fancybox.min.js"></script>
    <script src="js/jquery.easing.1.3.js"></script>
    <script src="js/bootstrap-datepicker.min.js"></script>
    <script src="js/aos.js"></script>

    <script src="js/main.js"></script>

</body>

</html>
